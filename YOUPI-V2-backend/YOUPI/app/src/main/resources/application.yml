spring:
  application:
    name: youpi-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ── R2DBC (Reactive Database — PostgreSQL) ──
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # ── Flyway (JDBC — runs migrations at startup) ──
  flyway:
    enabled: true
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    locations: classpath:db/migrations
    baseline-on-migrate: true

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0
          max-wait: 1s
        shutdown-timeout: 100ms

  # ── Jackson ──
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ── WebFlux ──
  webflux:
    base-path: /api

server:
  port: ${SERVER_PORT:8082}
  forward-headers-strategy: framework

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

# ── SpringDoc OpenAPI / Swagger UI ──
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
  show-actuator: false
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

youpi:
  auth:
    dummy:
      mobile: ${AUTH_DUMMY_MOBILE:}
      otp: ${AUTH_DUMMY_OTP:}
      enabled: ${AUTH_DUMMY_ENABLED:false}
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    access-token-ttl: 15m
    refresh-token-ttl: 30d

  firebase:
    project-id: ${FIREBASE_PROJECT_ID:you-pi-55f85}
    database-url: ${FIREBASE_DATABASE_URL:}
    # NO service-account-path — credentials come from Google ADC
    # On Cloud Run: the service's attached service account is used automatically
    # Locally: run  gcloud auth application-default login

  encryption:
    aes-key: ${AES_KEY}

  sms:
    msg91-auth-key: ${MSG91_AUTH_KEY:}
    otp-template-id: ${MSG91_TEMPLATE_ID:}

  recharge:
    gold-invest-percentage: 1.0

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

  a1topup:
    base-url: ${A1TOPUP_BASE_URL:https://business.a1topup.com/recharge/api}
    username: ${A1TOPUP_USERNAME:}
    password: ${A1TOPUP_PASSWORD:}

  augmont:
    base-url: ${AUGMONT_BASE_URL:https://uat-api.augmont.com}
    email: ${AUGMONT_EMAIL:}
    password: ${AUGMONT_PASSWORD:}

  digio:
    api-key: ${DIGIO_API_KEY:}
    base-url: ${DIGIO_BASE_URL:https://api.digio.in}

  karza:
    api-key: ${KARZA_API_KEY:}
    base-url: ${KARZA_BASE_URL:https://api.karza.in}

  rate-limit:
    otp-send:
      max-requests: 3
      window-seconds: 600
    payment:
      max-requests: 10
      window-seconds: 3600
    plans:
      max-requests: 60
      window-seconds: 60

# ── mPlan API Config ──
mplan:
  api:
    key: ${MPLAN_API_KEY:}
    operator-check-url: http://operatorcheck.mplan.in/api/operatorinfo.php
    plans-url: https://www.mplan.in/api/plans.php
    mobile-plans-url: https://www.mplan.in/apiv2/mobileplans
    recharge-url: https://www.mplan.in/api/recharge.php

# ── Profile: Local (developer laptop — local Redis, GCP or local DB) ──
---
spring:
  config:
    activate:
      on-profile: local
  r2dbc:
    url: ${DB_R2DBC_URL:r2dbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  flyway:
    url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5432/postgres}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 1s
      timeout: 1s

# ── Profile: Dev ──
---
spring:
  config:
    activate:
      on-profile: dev

# ── Profile: Prod ──
---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    enabled: true

# ── Profile: GCP (Cloud Run — new GCP infra) ──
---
spring:
  config:
    activate:
      on-profile: gcp
  r2dbc:
    url: ${DB_R2DBC_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    url: ${DB_JDBC_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}