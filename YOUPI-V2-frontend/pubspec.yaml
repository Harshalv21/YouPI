name: youpi
description: YOUPI — India's smartest FinTech super-app for Tier 2 & 3 users. Powered by Nexospendz Finothrive.
publish_to: 'none'
version: 2.4.3+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  go_router: ^13.2.0
  dio: ^5.4.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  pin_code_fields: ^8.0.1
  lottie: ^3.0.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
google_sign_in: ^6.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/you-pi_logo.jpg"
